<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Admin Login - St. Teresa Children Learning Centre</title>

<link rel="icon" href="favicon2.png" type="image/x-icon"/>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=Nunito&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  height: 100vh;
  overflow: hidden; /* 🚀 NO SCROLL */
  background: linear-gradient(135deg, #4caf50, #81c784);
  display: flex;
  flex-direction: column;
}

/* Layout wrapper */
.page {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* Center area */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Login card */
.login-container {
  background: rgba(255,255,255,0.95);
  padding: 40px 30px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  text-align: center;
  width: 100%;
  max-width: 380px;
}

/* Logo */
.school-logo {
  width: 80px;
  margin-bottom: 8px;
}

/* School name */
.school-name {
  font-family: 'Comfortaa', cursive;
  color: #1b5e20;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 15px;
}

/* Title */
.login-container h2 {
  color: #2e7d32;
  font-size: 24px;
  margin-bottom: 20px;
}

/* Inputs */
.input-wrapper {
  position: relative;
  margin-bottom: 15px;
}

.login-container input {
  width: 100%;
  padding: 11px 40px 11px 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 0.95rem;
}

.login-container input:focus {
  outline: none;
  border-color: #388e3c;
}

/* Eye icon */
.toggle-password {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #555;
}

/* Remember row */
.remember-wrapper {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  font-size: 0.9rem;
}

.remember-wrapper label {
  display: flex;
  align-items: center;
  gap: 6px;
}

.remember-wrapper input {
  margin: 0;
}

/* Button */
.login-container button {
  background: #2e7d32;
  color: #fff;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
}

.login-container button:hover {
  background: #1b5e20;
}

/* Error */
#loginError {
  color: red;
  margin-top: 10px;
  font-size: 0.9rem;
}

/* Footer */
footer {
  text-align: center;
  background: #1b5e20;
  color: #fff;
  padding: 10px;
  font-size: 0.85rem;
}

footer a {
  color: #a5d6a7;
  margin: 0 8px;
  text-decoration: none;
}

footer a:hover {
  text-decoration: underline;
}

/* RESPONSIVE FIX */
@media(max-height: 700px){
  .login-container {
    padding: 30px 20px;
  }

  .school-name {
    font-size: 18px;
  }

  .login-container h2 {
    font-size: 22px;
  }
}
</style>
</head>

<body>

<div class="page">

  <!-- CENTER -->
  <div class="main">
    <div class="login-container">
      <img src="favicon2.png" class="school-logo" alt="Logo">
      <div class="school-name">St. Teresa Children Learning Centre</div>
      <h2>Admin Login</h2>

      <form id="loginForm">
        <div class="input-wrapper">
          <input type="text" id="username" placeholder="Username" required>
        </div>

        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Password" required>
          <i class="fa fa-eye toggle-password" id="togglePassword"></i>
        </div>

        <div class="remember-wrapper">
          <label>
            <input type="checkbox" id="rememberMe"> Remember Me
          </label>
          <a href="#">Forgot?</a>
        </div>

        <button type="submit">Login</button>
      </form>

      <p id="loginError"></p>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    © 2026 St. Teresa Children Learning Centre
    <br>
    <a href="privacy.html">Privacy</a>
    <a href="safeguarding.html">Safeguarding</a>
    <a href="terms.html">Terms</a>
  </footer>

</div>

<script>
const togglePassword = document.getElementById('togglePassword');
const passwordInput = document.getElementById('password');

togglePassword.addEventListener('click', () => {
  if(passwordInput.type === 'password'){
    passwordInput.type = 'text';
    togglePassword.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    passwordInput.type = 'password';
    togglePassword.classList.replace('fa-eye-slash', 'fa-eye');
  }
});

const loginForm = document.getElementById('loginForm');
const loginError = document.getElementById('loginError');

loginForm.addEventListener('submit', function(e) {
  e.preventDefault();

  const username = document.getElementById('username').value.trim();
  const password = passwordInput.value.trim();
  const rememberMe = document.getElementById('rememberMe').checked;

  if(username === 'admin' && password === 'admin123'){
    if(rememberMe) localStorage.setItem('loggedIn','true');
    else sessionStorage.setItem('loggedIn','true');
    window.location.href = 'admin.html';
  } else {
    loginError.textContent = 'Invalid username or password';
  }
});
</script>

</body>
</html>
