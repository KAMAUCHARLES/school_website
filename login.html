<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Admin Login - St. Teresa Children Learning Centre</title>

<link rel="icon" href="favicon2.png" type="image/x-icon"/>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=Nunito&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(135deg, #4caf50, #81c784);
}

/* Center content properly */
.login-wrapper {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* Login Card */
.login-container {
  background: rgba(255,255,255,0.95);
  padding: 50px 35px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  width: 100%;
  max-width: 420px;
  text-align: center;
}

/* Logo + School */
.school-logo {
  width: 90px;
  height: 90px;
  object-fit: contain;
  margin-bottom: 10px;
}

.school-name {
  font-family: 'Comfortaa', cursive;
  color: #1b5e20;
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 20px;
}

.login-container h2 {
  font-family: 'Comfortaa', cursive;
  color: #2e7d32;
  font-size: 26px;
  margin-bottom: 30px;
}

/* Inputs */
.input-wrapper {
  position: relative;
  margin-bottom: 20px;
}

.login-container input {
  width: 100%;
  padding: 12px 45px 12px 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 1rem;
}

.login-container input:focus {
  outline: none;
  border-color: #388e3c;
  box-shadow: 0 0 5px #66bb6a;
}

/* Eye Icon */
.toggle-password {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #555;
  font-size: 1.1rem;
}

/* Remember + Forgot */
.remember-wrapper {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
  font-size: 0.95rem;
}

.remember-wrapper label {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}

.remember-wrapper input[type="checkbox"] {
  width: 16px;
  height: 16px;
}

/* Links */
.login-container a {
  color: #2e7d32;
  text-decoration: none;
}

.login-container a:hover {
  text-decoration: underline;
}

/* Button */
.login-container button {
  background: #2e7d32;
  color: #fff;
  padding: 14px;
  width: 100%;
  border: none;
  border-radius: 8px;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.3s;
}

.login-container button:hover {
  background: #1b5e20;
}

/* Error */
#loginError {
  color: red;
  margin-top: 18px;
  font-weight: 600;
}

/* Footer (FIXED PROPERLY) */
footer {
  width: 100%;
  background: #1b5e20;
  color: #fff;
  padding: 15px 10px;
  text-align: center;
  font-size: 0.9rem;
  margin-top: auto;
}

footer a {
  color: #a5d6a7;
  margin: 0 10px;
  text-decoration: none;
}

footer a:hover {
  text-decoration: underline;
}

/* Responsive */
@media(max-width: 480px){
  .login-container { padding: 40px 25px; }
  .school-name { font-size: 20px; }
  .login-container h2 { font-size: 24px; }
}

@media(max-width: 360px){
  .login-container { padding: 35px 20px; }
  .school-logo { width: 70px; height: 70px; }
}
</style>
</head>

<body>

<div class="login-wrapper">
  <div class="login-container">
    <img src="favicon2.png" alt="School Logo" class="school-logo">
    <div class="school-name">St. Teresa Children Learning Centre</div>
    <h2>Admin Login</h2>

    <form id="loginForm">
      <div class="input-wrapper">
        <input type="text" id="username" placeholder="Username" required>
      </div>

      <div class="input-wrapper">
        <input type="password" id="password" placeholder="Password" required>
        <i class="fa fa-eye toggle-password" id="togglePassword"></i>
      </div>

      <div class="remember-wrapper">
        <label><input type="checkbox" id="rememberMe"> Remember Me</label>
        <a href="#">Forgot Password?</a>
      </div>

      <button type="submit">Login</button>
    </form>

    <p id="loginError"></p>
  </div>
</div>

<footer>
  &copy; 2026 St. Teresa Children Learning Centre. All rights reserved.
  <br>
  <a href="privacy.html">Privacy Policy</a>
  <a href="safeguarding.html">Safeguarding</a>
  <a href="terms.html">Terms & Conditions</a>
</footer>

<script>
const togglePassword = document.getElementById('togglePassword');
const passwordInput = document.getElementById('password');

togglePassword.addEventListener('click', () => {
  if(passwordInput.type === 'password') {
    passwordInput.type = 'text';
    togglePassword.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    passwordInput.type = 'password';
    togglePassword.classList.replace('fa-eye-slash', 'fa-eye');
  }
});

const loginForm = document.getElementById('loginForm');
const loginError = document.getElementById('loginError');

loginForm.addEventListener('submit', function(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const rememberMe = document.getElementById('rememberMe').checked;

  if(username === 'admin' && password === 'admin123') {
    if(rememberMe) localStorage.setItem('loggedIn', 'true');
    else sessionStorage.setItem('loggedIn', 'true');
    window.location.href = 'admin.html';
  } else {
    loginError.textContent = 'Invalid username or password';
  }
});
</script>

</body>
</html>
