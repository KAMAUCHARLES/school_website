<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Admin Login - St. Teresa Children Learning Centre</title>

<link rel="icon" href="favicon2.png" type="image/x-icon"/>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@600&family=Nunito&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* NO SCROLL */
html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
}

/* Background */
body {
  background: linear-gradient(135deg, #2e7d32, #66bb6a);
}

/* Layout */
.page {
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Center content */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* Login Card */
.login-card {
  width: 100%;
  max-width: 360px;
  padding: 30px 25px;
  border-radius: 14px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.4);
  box-shadow: 0 10px 35px rgba(0,0,0,0.2);
  text-align: center;
}

/* Logo */
.logo {
  width: 65px;
  margin-bottom: 10px;
}

/* School name */
.school-name {
  font-family: 'Comfortaa', cursive;
  font-size: 18px;
  color: #1b5e20;
  margin-bottom: 20px;
}

/* Title */
.login-card h2 {
  font-size: 22px;
  margin-bottom: 20px;
  color: #2e7d32;
}

/* Inputs */
.input-group {
  position: relative;
  margin-bottom: 16px;
}

.input-group input {
  width: 100%;
  padding: 12px 42px 12px 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
  transition: 0.2s;
}

.input-group input:focus {
  border-color: #2e7d32;
  box-shadow: 0 0 5px rgba(46,125,50,0.4);
  outline: none;
}

/* Eye icon */
.toggle-password {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #666;
}

/* Options */
.options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  margin-bottom: 20px;
}

.options label {
  display: flex;
  align-items: center;
  gap: 6px;
}

.options input {
  margin: 0;
}

.options a {
  text-decoration: none;
  color: #2e7d32;
}

.options a:hover {
  text-decoration: underline;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  background: #2e7d32;
  border: none;
  color: #fff;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #1b5e20;
}

/* Error */
#error {
  margin-top: 12px;
  color: red;
  font-size: 13px;
}

/* ===== FOOTER (FIXED + STYLED) ===== */
.footer {
  text-align: center;
  font-size: 12px;
  padding: 12px 10px;
  color: rgba(255,255,255,0.7);

  background: #0e2e0e;
  backdrop-filter: blur(6px);

  border-top: 1px solid rgba(255,255,255,0.2);
}

/* Footer links */
.footer a {
  margin: 0 8px;
  color: rgba(255,255,255,0.7);
  text-decoration: none;
  font-weight: 500;
  transition: 0.2s;
}

.footer a:hover {
  color: #d4af37;
}

/* Mobile fine tuning */
@media (max-width: 400px) {
  .footer {
    font-size: 11px;
    padding: 10px 6px;
  }

  .footer a {
    display: inline-block;
    margin: 4px 6px;
  }

  .login-card {
    padding: 20px;
  }

  .logo {
    width: 50px;
  }

  .school-name {
    font-size: 16px;
  }

  .login-card h2 {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<div class="page">

  <!-- CENTER -->
  <div class="main">
    <div class="login-card">
      <img src="favicon2.png" class="logo" alt="logo">
      <div class="school-name">St. Teresa Children Learning Centre</div>
      <h2>Admin Login</h2>

      <form id="loginForm">
        <div class="input-group">
          <input type="text" id="username" placeholder="Username" required>
        </div>

        <div class="input-group">
          <input type="password" id="password" placeholder="Password" required>
          <i class="fa fa-eye toggle-password" id="togglePassword"></i>
        </div>

        <div class="options">
          <label>
            <input type="checkbox" id="rememberMe"> Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit">Login</button>
      </form>

      <div id="error"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div>© 2026 St. Teresa Children Learning Centre</div>
    <div>
      <a href="privacy.html">Privacy</a> 
      <a href="safeguarding.html">Safeguarding</a> 
      <a href="terms.html">Terms&Conditions</a>
    </div>
  </div>

</div>

<script>
const togglePassword = document.getElementById('togglePassword');
const password = document.getElementById('password');

togglePassword.addEventListener('click', () => {
  if(password.type === 'password'){
    password.type = 'text';
    togglePassword.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    password.type = 'password';
    togglePassword.classList.replace('fa-eye-slash', 'fa-eye');
  }
});

const form = document.getElementById('loginForm');
const error = document.getElementById('error');

form.addEventListener('submit', (e)=>{
  e.preventDefault();

  const username = document.getElementById('username').value.trim();
  const pass = password.value.trim();
  const remember = document.getElementById('rememberMe').checked;

  if(username === 'admin' && pass === 'admin123'){
    if(remember){
      localStorage.setItem('loggedIn', 'true');
    } else {
      sessionStorage.setItem('loggedIn', 'true');
    }
    window.location.href = 'admin.html';
  } else {
    error.textContent = "Invalid username or password";
  }
});
</script>

</body>
</html>
